; Límites de subida propios de ESTE proyecto.
; PHP-FPM lee .user.ini por directorio: aplica solo aquí, sin tocar el
; php.ini global del servidor (aislamiento entre proyectos del VPS).
; El logo del branding permite hasta 5 MB — el default de PHP (2 MB)
; rechazaba la subida antes de llegar a la validación de Filament.
; PHP-FPM cachea este archivo 5 min (user_ini.cache_ttl).
upload_max_filesize = 10M
post_max_size = 12M
